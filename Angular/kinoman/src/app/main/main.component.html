<input type="text" class="filter" [(ngModel)]="filterText" placeholder="type text here..">

<nav>
  <ul class="navigation">
    <li *ngFor="let genre of genres" #genre (click)="getGenre(genre.name)">
      <h4 class="genre">{{genre.name}}</h4>
    </li>
  </ul>
</nav>
<div class="content" *ngIf = "!filterStatuss;else filter">
  <ul>
    <li  *ngFor="let movie of movies | paginate:{itemsPerPage:14,currentPage:page}">
      <a [routerLink]="['item',movie.id]">
        <img [src]="movie.poster" alt="image" activeelement>
      </a>
      <h2>{{movie.title}}</h2>
      <p class="imdb">IMDB:
        <label>{{movie.rate}}</label>
      </p>
      <p>Год {{movie.year}}</p>
      <p class="type">Жанр:{{movie.genre}}</p>
   </li>
   <pagination-controls (pageChange)="page=$event"></pagination-controls>
  </ul>
</div>
<ng-template #filter>
  <ul>
    <li  *ngFor="let movie of filteredMovies | paginate:{itemsPerPage:14,currentPage:page}">
      <a [routerLink]="['item',movie.id]">
        <img [src]="movie.poster" alt="image" activeelement>
      </a>
      <h2>{{movie.title}}</h2>
      <p class="imdb">IMDB:
        <label>{{movie.rate}}</label>
      </p>
      <p>Год {{movie.year}}</p>
      <p class="type">Жанр:{{movie.genre}}</p>
   </li>
   <pagination-controls (pageChange)="page=$event"></pagination-controls>
  </ul>
</ng-template>
